name: Resume Render Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: "20 13 * * 1-5"

jobs:
  resume:
    runs-on: ubuntu-latest
    steps:
      - name: Resume service
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/resume" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json"
